name: Update profile stats

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC (four times a day)
    - cron: "0 */6 * * *"
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
  push:
    branches: [master]      # regenerate on pushes to main too

permissions:
  contents: write         # needed so the job can commit the regenerated SVGs

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: hamadsec
        run: python today.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update profile stats [skip ci]"
            git push
          fi
